name: Github-Rdp[Windows]

on:
  workflow_dispatch:

jobs:
  build-on-windows:
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      # Step 1: Set runneradmin password
      - name: Set runneradmin password
        shell: cmd
        continue-on-error: true
        run: |
          net user runneradmin "OLDUNER#6"
          net localgroup Administrators runneradmin /add

      # Install VS Code
      - name: Install VS Code
        shell: pwsh
        continue-on-error: true
        run: |
          $url = "https://update.code.visualstudio.com/latest/win32-x64-user/stable"
          $output = "$env:TEMP\VSCodeSetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $output
          Start-Process -FilePath $output -Args "/silent /mergetasks=!runcode" -Wait

      # Install JDK 26
      - name: Install JDK 26
        shell: pwsh
        continue-on-error: true
        run: |
          $url = "https://download.oracle.com/java/26/latest/jdk-26_windows-x64_bin.msi"
          $output = "$env:TEMP\jdk-26.msi"
          Invoke-WebRequest -Uri $url -OutFile $output
          Start-Process -FilePath msiexec.exe -Args "/i $output /qn" -Wait

      # Step 2: Restore Data folder cache
      - name: Restore Data folder cache
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: $env:USERPROFILE\Desktop\Data
          key: ${{ runner.os }}-runner-desktop-data-${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}-runner-desktop-data-

      # Step 3: Download Pinggy CLI
      - name: Download Pinggy CLI
        shell: pwsh
        continue-on-error: true
        run: |
          $url = "https://s3.ap-south-1.amazonaws.com/public.pinggy.binaries/cli/v0.2.5/windows/amd64/pinggy.exe"
          $output = "$env:USERPROFILE\pinggy.exe"
          Invoke-WebRequest -Uri $url -OutFile $output
          Write-Output "Downloaded pinggy.exe to $output"

      # Install opencode-ai in background
      - name: Install opencode-ai
        shell: pwsh
        continue-on-error: true
        run: |
          Start-Job -ScriptBlock {
            $runnerDir = "$env:USERPROFILE\AppData\Roaming\npm"
            New-Item -ItemType Directory -Force -Path $runnerDir
            npm config set prefix $runnerDir
            npm install -g opencode-ai
            $machinePath = [Environment]::GetEnvironmentVariable("Path", "Machine")
            if ($machinePath -notlike "*$runnerDir*") {
              [Environment]::SetEnvironmentVariable("Path", "$machinePath;$runnerDir", "Machine")
            }
          }

      # Install Bun in background
      - name: Install Bun
        shell: pwsh
        continue-on-error: true
        run: |
          Start-Job -ScriptBlock {
            $env:BUN_INSTALL = "$env:USERPROFILE\.bun"
            irm bun.sh/install.ps1 | iex
          }

      # Step 4: Run reverse tunnel with Pinggy (timeout 5h 45m)
      - name: Run reverse tunnel with Pinggy
        shell: pwsh
        timeout-minutes: 350
        continue-on-error: true
        run: |
          $pinggy = "$env:USERPROFILE\pinggy.exe"
          while ($true) {
              & $pinggy -p 443 -R0:127.0.0.1:3389 `
                  -o StrictHostKeyChecking=no `
                  -o ServerAliveInterval=30 `
                  -o ServerAliveCountMax=3 `
                  force+tcp@free.pinggy.io
              Start-Sleep -Seconds 10
          }

      # Step 5: Save Data folder cache
      - name: Save Data folder cache
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: $env:USERPROFILE\Desktop\Data
          key: ${{ runner.os }}-runner-desktop-data-${{ github.run_number }}
