name: GitHub Hosted Runner SSH Tunnel

on:
  workflow_dispatch:

jobs:
  tunnel:
    runs-on: ubuntu-latest

    steps:
      - name: Update package list
        if: always()
        continue-on-error: true
        run: |
          sudo apt-get update

      - name: Install SSH, autossh, tmux and dependencies
        if: always()
        continue-on-error: true
        run: |
          sudo apt-get install -y openssh-server sshpass tmux autossh

      - name: Set root password
        if: always()
        continue-on-error: true
        run: |
          echo "root:root" | sudo chpasswd

      - name: Configure SSH for interactive sessions
        if: always()
        continue-on-error: true
        run: |
          sudo sed -i.bak -E 's/^#?PermitRootLogin\s+.*/PermitRootLogin yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PermitTTY yes/PermitTTY yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^#PrintMotd yes/PrintMotd no/' /etc/ssh/sshd_config
          echo "ForceCommand /bin/bash -l" | sudo tee -a /etc/ssh/sshd_config
          sudo systemctl restart ssh || sudo service ssh restart || true

      - name: Start SSH service
        if: always()
        continue-on-error: true
        run: |
          sudo service ssh start || true

      - name: Create root home directory and data folder with permissions
        if: always()
        continue-on-error: true
        run: |
          sudo mkdir -p /root
          sudo chown root:root /root
          sudo chmod 755 /root
          sudo mkdir -p /root/data
          sudo chown root:root /root/data
          sudo chmod 777 /root/data

      - name: Restore /root/data cache
        if: always()
        continue-on-error: true
        uses: actions/cache@v3
        id: cache-restore
        with:
          path: /root/data
          key: ${{ runner.os }}-data-${{ hashFiles('**/lockfile') }}
          restore-keys: |
            ${{ runner.os }}-data-

      - name: Setup Serveo tunnel with autossh (persistent)
        if: always()
        continue-on-error: true
        run: |
          autossh -M 0 -f -N \
            -o "ServerAliveInterval=60" \
            -o "ServerAliveCountMax=3" \
            -o "StrictHostKeyChecking=no" \
            -o "UserKnownHostsFile=/dev/null" \
            -o "ExitOnForwardFailure=yes" \
            -R my-github-runner:22:localhost:22 \
            root@serveo.net \
            2>&1
          
          echo "Tunnel established with autossh"

      - name: Keep workflow alive
        if: always()
        continue-on-error: true
        timeout-minutes: 350
        run: |
          while true; do
            if ! pgrep -f "autossh.*serveo" > /dev/null; then
              autossh -M 0 -f -N \
                -o "ServerAliveInterval=60" \
                -o "StrictHostKeyChecking=no" \
                -o "UserKnownHostsFile=/dev/null" \
                -R my-github-runner:22:localhost:22 \
                root@serveo.net 2>&1
            fi
            sleep 60
          done

      - name: Save /root/data cache
        if: always()
        continue-on-error: true
        uses: actions/cache@v3
        with:
          path: /root/data
          key: ${{ runner.os }}-data-${{ hashFiles('**/lockfile') }}
