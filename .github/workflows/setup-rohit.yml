name: Setup Rohit User

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: windows-latest
    steps:
      - name: Create Rohit user
        shell: cmd
        run: |
          net user Rohit "OLDUNER#6" /add
          net localgroup Administrators Rohit /add
          net user Rohit /active:yes

      - name: Install Bun for Rohit
        shell: pwsh
        run: |
          $env:BUN_INSTALL = "C:\Users\Rohit\.bun"
          irm bun.sh/install.ps1 | iex

      - name: Install opencode-ai for Rohit
        shell: pwsh
        run: |
          $rohitDir = "C:\Users\Rohit\AppData\Roaming\npm"
          New-Item -ItemType Directory -Force -Path $rohitDir
          npm config set prefix $rohitDir
          npm install -g opencode-ai

      - name: Add paths to machine PATH
        shell: pwsh
        run: |
          $paths = @("C:\Users\Rohit\.bun\bin", "C:\Users\Rohit\AppData\Roaming\npm")
          $currentPath = [Environment]::GetEnvironmentVariable("Path", "Machine")
          foreach ($dir in $paths) {
            if ($currentPath -notlike "*$dir*") {
              $currentPath = "$currentPath;$dir"
              [Environment]::SetEnvironmentVariable("Path", $currentPath, "Machine")
              Write-Output "Added $dir to PATH"
            }
          }

      - name: Verify installations
        shell: pwsh
        run: |
          Write-Output "=== Rohit User ==="
          Get-LocalUser Rohit | Select-Object Name, Enabled, Description

          Write-Output "`n=== Bun ==="
          $bunPath = "C:\Users\Rohit\.bun\bin\bun.exe"
          if (Test-Path $bunPath) {
            Write-Output "Bun installed at: $bunPath"
            & $bunPath --version
          } else {
            Write-Output "Bun NOT found at $bunPath"
          }

          Write-Output "`n=== opencode-ai ==="
          $dirsToCheck = @(
            "C:\Users\Rohit\AppData\Roaming\npm",
            "C:\Users\runneradmin\AppData\Roaming\npm"
          )
          $found = $false
          foreach ($dir in $dirsToCheck) {
            if (Test-Path "$dir\opencode.cmd") {
              Write-Output "Found: $dir\opencode.cmd"
              & "$dir\opencode.cmd" --version
              $found = $true
              break
            }
            if (Test-Path "$dir\opencode-ai.cmd") {
              Write-Output "Found: $dir\opencode-ai.cmd"
              $found = $true
              break
            }
            if (Test-Path "$dir\node_modules\.bin\opencode.cmd") {
              Write-Output "Found: $dir\node_modules\.bin\opencode.cmd"
              $found = $true
              break
            }
          }
          if (-not $found) {
            Write-Output "opencode-ai NOT found. Searching..."
            Get-ChildItem C:\Users -Recurse -Depth 4 -Filter "opencode*" -Name -ErrorAction SilentlyContinue
            Write-Output "--- npm global list ---"
            npm ls -g --depth=0
          }

          Write-Output "`n=== PATH verification ==="
          $rohitDirs = @("C:\Users\Rohit\.bun\bin", "C:\Users\Rohit\AppData\Roaming\npm")
          foreach ($dir in $rohitDirs) {
            $machinePath = [Environment]::GetEnvironmentVariable("Path", "Machine")
            if ($machinePath -like "*$dir*") {
              Write-Output "$dir is in PATH ✅"
            } else {
              Write-Output "$dir is NOT in PATH ❌"
            }
          }
