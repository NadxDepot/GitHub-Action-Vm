name: List Users

on:
  workflow_dispatch:

jobs:
  list:
    runs-on: windows-latest
    steps:
      - name: List all users
        shell: pwsh
        run: |
          Write-Output "=== Local Users ==="
          Get-LocalUser | Select-Object Name, Enabled, LastLogon, Description | Format-Table -AutoSize
          Write-Output ""
          Write-Output "=== User Profiles ==="
          Get-ChildItem C:\Users | Select-Object Name
          Write-Output ""
          Write-Output "=== Current User ==="
          Write-Output "USERPROFILE: $env:USERPROFILE"
          Write-Output "USERNAME: $env:USERNAME"
